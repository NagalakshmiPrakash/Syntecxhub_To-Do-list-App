<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>TO-DO LIST APP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:
      linear-gradient(135deg,#020617,#0f172a,#1e293b);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:absolute;
      width:300px;
      height:300px;
      background:#3b82f6;
      filter:blur(120px);
      top:-80px;
      left:-80px;
      opacity:0.4;
    }

    body::after{
      content:"";
      position:absolute;
      width:250px;
      height:250px;
      background:#06b6d4;
      filter:blur(120px);
      bottom:-80px;
      right:-80px;
      opacity:0.3;
    }

    .container{
      width:100%;
      max-width:550px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:28px;
      padding:35px;
      box-shadow:0 15px 45px rgba(0,0,0,0.4);
      z-index:1;
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(25px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .header{
      text-align:center;
      margin-bottom:28px;
    }

    .logo{
      width:75px;
      height:75px;
      margin:auto;
      margin-bottom:15px;
      border-radius:20px;
      background:linear-gradient(135deg,#06b6d4,#3b82f6);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:2rem;
      color:white;
      box-shadow:0 10px 25px rgba(59,130,246,0.35);
    }

    .header h1{
      color:#fff;
      font-size:2.2rem;
      font-weight:700;
      margin-bottom:8px;
    }

    .header p{
      color:#cbd5e1;
      font-size:0.95rem;
      line-height:1.6;
    }

    .input-section{
      display:flex;
      gap:12px;
      margin-bottom:25px;
    }

    .input-section input{
      flex:1;
      padding:16px;
      border:none;
      outline:none;
      border-radius:16px;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.12);
      color:white;
      font-size:1rem;
      transition:0.3s;
    }

    .input-section input:focus{
      border-color:#38bdf8;
      box-shadow:0 0 0 4px rgba(56,189,248,0.15);
    }

    .input-section input::placeholder{
      color:#cbd5e1;
    }

    .add-btn{
      border:none;
      padding:16px 22px;
      border-radius:16px;
      background:linear-gradient(135deg,#06b6d4,#3b82f6);
      color:white;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .add-btn:hover{
      transform:translateY(-2px) scale(1.03);
      box-shadow:0 10px 20px rgba(59,130,246,0.35);
    }

    .dashboard{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:15px;
      margin-bottom:25px;
    }

    .card{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:18px;
      text-align:center;
    }

    .card h2{
      color:white;
      font-size:1.8rem;
      margin-bottom:5px;
    }

    .card p{
      color:#cbd5e1;
      font-size:0.9rem;
    }

    .task-list{
      list-style:none;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .task{
      background:rgba(255,255,255,0.09);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      transition:0.3s;
      animation:slideUp 0.4s ease;
    }

    @keyframes slideUp{
      from{
        opacity:0;
        transform:translateY(15px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .task:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,0.13);
    }

    .task-left{
      display:flex;
      align-items:center;
      gap:14px;
      flex:1;
    }

    .check-btn{
      width:24px;
      height:24px;
      border-radius:50%;
      border:2px solid #38bdf8;
      cursor:pointer;
      transition:0.3s;
      flex-shrink:0;
    }

    .completed .check-btn{
      background:#22c55e;
      border-color:#22c55e;
      position:relative;
    }

    .completed .check-btn::after{
      content:"✔";
      position:absolute;
      color:white;
      font-size:12px;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
    }

    .task-text{
      color:white;
      font-size:1rem;
      word-break:break-word;
    }

    .completed .task-text{
      text-decoration:line-through;
      opacity:0.6;
    }

    .task-actions{
      display:flex;
      gap:10px;
    }

    .action-btn{
      width:40px;
      height:40px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:1rem;
      color:white;
      transition:0.3s;
    }

    .delete-btn{
      background:#ef4444;
    }

    .delete-btn:hover{
      background:#dc2626;
      transform:scale(1.08);
    }

    .empty-message{
      text-align:center;
      color:#cbd5e1;
      padding:25px;
      background:rgba(255,255,255,0.06);
      border-radius:18px;
      border:1px dashed rgba(255,255,255,0.15);
      font-size:0.95rem;
    }

    .footer{
      margin-top:28px;
      text-align:center;
      color:#94a3b8;
      font-size:0.85rem;
      line-height:1.7;
    }

    @media(max-width:650px){

      .container{
        padding:25px;
      }

      .header h1{
        font-size:1.9rem;
      }

      .input-section{
        flex-direction:column;
      }

      .add-btn{
        width:100%;
      }

      .dashboard{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="header">

      <div class="logo">
        📝
      </div>

      <h1>TO-DO LIST APP</h1>

      <p>
        Organize your daily tasks efficiently and boost your productivity with a modern smart to-do app.
      </p>

    </div>

    <div class="input-section">

      <input type="text" id="taskInput" placeholder="Enter a new task...">

      <button class="add-btn" id="addBtn">
        + Add Task
      </button>

    </div>

    <div class="dashboard">

      <div class="card">
        <h2 id="totalTasks">0</h2>
        <p>Total Tasks</p>
      </div>

      <div class="card">
        <h2 id="completedTasks">0</h2>
        <p>Completed Tasks</p>
      </div>

    </div>

    <ul class="task-list" id="taskList"></ul>

    <div class="footer">
      Developed using HTML, CSS & JavaScript 🚀
      <br>
      Syntecxhub Frontend Internship Project
    </div>

  </div>

  <script>

    const taskInput = document.getElementById("taskInput");
    const addBtn = document.getElementById("addBtn");
    const taskList = document.getElementById("taskList");
    const totalTasks = document.getElementById("totalTasks");
    const completedTasks = document.getElementById("completedTasks");

    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    displayTasks();

    addBtn.addEventListener("click", addTask);

    taskInput.addEventListener("keypress", function(e){

      if(e.key === "Enter"){
        addTask();
      }

    });

    function addTask(){

      const text = taskInput.value.trim();

      if(text === ""){

        alert("Please enter a task!");
        return;

      }

      const task = {

        id: Date.now(),
        text: text,
        completed: false

      };

      tasks.push(task);

      saveTasks();
      displayTasks();

      taskInput.value = "";

    }

    function displayTasks(){

      taskList.innerHTML = "";

      if(tasks.length === 0){

        taskList.innerHTML = `

          <div class="empty-message">

            📋 No tasks added yet.
            <br><br>
            Start by adding your first task!

          </div>

        `;

      }

      tasks.forEach(task => {

        const li = document.createElement("li");

        li.className = task.completed ? "task completed" : "task";

        li.innerHTML = `

          <div class="task-left">

            <div class="check-btn"
            onclick="toggleTask(${task.id})"></div>

            <span class="task-text">
              ${task.text}
            </span>

          </div>

          <div class="task-actions">

            <button class="action-btn delete-btn"
            onclick="deleteTask(${task.id})">

              🗑

            </button>

          </div>

        `;

        taskList.appendChild(li);

      });

      updateStats();

    }

    function toggleTask(id){

      tasks = tasks.map(task => {

        if(task.id === id){

          return {

            ...task,
            completed: !task.completed

          };

        }

        return task;

      });

      saveTasks();
      displayTasks();

    }

    function deleteTask(id){

      tasks = tasks.filter(task => task.id !== id);

      saveTasks();
      displayTasks();

    }

    function updateStats(){

      const total = tasks.length;

      const completed = tasks.filter(task =>
      task.completed).length;

      totalTasks.innerText = total;

      completedTasks.innerText = completed;

    }

    function saveTasks(){

      localStorage.setItem("tasks",
      JSON.stringify(tasks));

    }

  </script>

</body>
</html>
